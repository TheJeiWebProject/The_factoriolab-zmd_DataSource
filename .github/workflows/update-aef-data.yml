name: Update AEF Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout upstream factoriolab-zmd
        uses: actions/checkout@v4
        with:
          repository: Bakingss/factoriolab-zmd
          path: upstream
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Capture upstream commit
        id: upstream
        run: echo "sha=$(git -C upstream rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inherit upstream LICENSE
        run: cp upstream/LICENSE LICENSE

      - name: Build AEF pack
        env:
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.sha }}
        run: npm run build -- --source upstream/src/data/aef/data.json --out-dir dist

      - name: Update upstream snapshot
        run: |
          cat > UPSTREAM_SNAPSHOT.json <<EOF
          {
            "upstreamRepository": "https://github.com/Bakingss/factoriolab-zmd",
            "upstreamCommit": "${{ steps.upstream.outputs.sha }}",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE NOTICE.md UPSTREAM_SNAPSHOT.json dist
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync from upstream ${{ steps.upstream.outputs.sha }}"
          git push
